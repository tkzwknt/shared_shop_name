<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8" />
</head>
<body>
<div th:fragment="layout-header">
	<div th:if="${session.user == null or session.user.authority == 2}" class="shop-header">
		<div class="shop-header__bar">
			<span class="shop-header__bar-text">ROASTED DAILY / SMALL BATCH / DIRECT TO YOU</span>
		</div>
		<div class="shop-header__main">
			<a th:href="@{/}" class="shop-header__brand">
				<span class="shop-header__main-name">FRANÇAIS COFFEE</span>
				<span class="shop-header__sub-name">sélection de cafés du monde</span>
			</a>
			<nav class="shop-header__nav" aria-label="メインメニュー">
				<a th:href="@{/client/story}">Story</a>
				<a th:href="@{/#top-origin}">Origins</a>
				<a th:href="@{/#top-process}">Brew Recipe</a>
				<a th:href="@{/client/item/list/1}">Coffee</a>
				<a th:href="@{/#top-process}">Brew Guide</a>
			</nav>
			<div class="shop-header__actions">
				<a th:href="${session.user == null} ? @{/login} : @{/client/favorite/list}" class="shop-header__icon-link" aria-label="お気に入り">
					<img th:src="@{/static/images/favorite.svg}" alt="" />
				</a>
				<a th:href="@{/client/item/list/1}" method="post" class="shop-header__icon-link" aria-label="商品検索">
<!--					<input type="hidden" id="categoryId" value="0">-->
					<img th:src="@{/static/images/search.svg}" alt="" />
				</a>
				<a th:href="@{/client/basket/list}" class="shop-header__icon-link" aria-label="買い物かご">
					<img th:src="@{/static/images/shopping.svg}" alt="" />
				</a>
				<a th:if="${session.user == null}" th:href="@{/login}" class="shop-header__login">Login</a>
				<div th:if="${session.user != null}" class="shop-header__user">
					<a th:href="@{/client/user/detail}" th:text="${session.user.name}"></a>
					<span>さん</span>
					<a th:href="@{/logout}" class="shop-header__logout">Logout</a>
				</div>
			</div>
		</div>
	</div>
	<div th:if="${session.user != null and (session.user.authority == 0 or session.user.authority == 1)}" class="container">
		<h1 th:class="site_title" th:text="#{shop.title}"></h1>
		<div class="user_info">
			<a th:href="@{/admin/user/detail/{id}(id=${session.user.id})}" th:text="${session.user.name}"></a>さん | <a th:href="@{/logout}" th:text="#{logout}"></a>
		</div>
	</div>
</div>
</body>
</html>
