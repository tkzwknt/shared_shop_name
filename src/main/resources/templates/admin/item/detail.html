<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_4block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{item}+#{title.detail}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>

<body class="admin item_detail_admin">
	<h2 th:class="title" th:text="#{item}+#{title.detail}"></h2>

	<div class="info_form_area" th:object="${item}">
		<div class="item_detail_area">
			<div class="item_image_area">
				<span th:if="*{image != null}">
					<img th:src="@{/images/{image}(image=*{image})}"></img>
				</span>
				<span th:if="*{image == null}">
					<img th:src="@{/images/common/no_image.jpg}"></img>
				</span>
			</div>
			<dl class="item_detail_list">
				<dt>[[#{itemForm.name}]]</dt>
				<dd th:text="*{name}"></dd>
				<dt>[[#{itemForm.price}]]</dt>
				<dd th:text="*{price}"></dd>
				<dt>[[#{itemForm.stock}]]</dt>
				<dd th:text="*{stock}"></dd>
				<dt>[[#{data.category}]]</dt>
				<dd th:text="*{categoryName}"></dd>
				<dt>[[#{itemForm.description}]]</dt>
				<dd th:text="*{description}"></dd>
			</dl>
		</div>

		<div class="detail_button_area">
			<form th:action="@{/admin/item/list}" method="post">
				<input type="submit" value="戻る" class="back_button" />
			</form>

			<form th:action="@{/admin/item/update/input/{id}(id=*{id})}" method="post">
				<input type="submit" value="変更" />
			</form>

			<form th:action="@{/admin/item/delete/check/{id}(id=*{id})}" method="post">
				<input type="submit" value="削除" class="delete" />
			</form>
		</div>
		<section class="review-section" aria-labelledby="review-heading">
        <div class="review-section__header">
            <div>
                <p class="eyebrow">Customer Reviews</p>
                <h2 id="review-heading">レビュー</h2>
                <p>この商品を使った感想を確認できます。</p>
            </div>
            <div class="review-score-card" aria-label="レビュー集計">
                <span class="review-score-card__label">Average</span>
                <strong th:text="${reviewAverage != null ? reviewAverage : '0.0'}">0.0</strong>
                <span class="review-stars" aria-hidden="true">★★★★★</span>
                <small th:text="${reviewCount != null ? reviewCount + '件のレビュー' : '0件のレビュー'}">0件のレビュー</small>
            </div>
        </div>

        <div class="review-layout">
            <div class="review-list-panel">
                <div class="review-list" th:if="${reviewLists != null and !#lists.isEmpty(reviewLists)}">
                    <article class="review-card" th:each="review : ${reviewLists}">
                        <div class="review-card__top">
                            <div>
                                <p class="review-card__user" th:text="${review.userName}">投稿者</p>
                                <time th:text="${#dates.format(review.createdAtText, 'yyyy/MM/dd')}">投稿日時</time>
                            </div>
                            <div class="review-card__rating" aria-label="星評価">
                                <span th:each="star : ${#numbers.sequence(1, 5)}"
                                      th:classappend="${review.rating != null and star <= review.rating} ? ' is-active' : ''">★</span>
                            </div>
                        </div>
                        <h3 th:text="${review.title != null and !#strings.isEmpty(review.title) ? review.title : 'タイトルなし'}">レビュータイトル</h3>
                        <p class="review-card__comment" th:text="${review.comment}">レビュー本文</p>
                        <form class="review-form" th:if = "${session.user != null and session.user.authority == 1}" th:action="@{/admin/item/review/delete}" method="post">
							<input type="hidden" name="id" th:field="*{id}">
							<input type="hidden" name="reviewId" th:value="${review.id}">
                        	<input type="submit" value = "削除"/>
                        </form>
                         <form class="review-form" th:if = "${session.user != null and session.user.authority == 1}" th:action="@{/admin/item/review/edit}" method="post">
							<input type="hidden" name="reviewId" th:value="${review.id}">
                        	<input type="submit" value = "編集"/>
                        </form>

                    </article>
                </div>

                <div class="review-empty-state" th:if="${reviewLists == null or #lists.isEmpty(reviewLists)}">
                    <span>☆</span>
                    <h3>レビューはまだありません</h3>
                    <p>Controller側でレビュー取得処理を実装すると、このエリアにレビューカードが表示されます。</p>
                </div>
            </div>
        </div>
    </section>
	</div>
</body>

</html>
