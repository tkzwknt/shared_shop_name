<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{common/layout_5block :: layout(~{::title},~{::body/content()})}">

<head>
	<title th:text="#{item}+#{title.detail}+' | '+ #{shop.title}"> </title>
	<meta charset="UTF-8" />
</head>
<body>


<main class="container">
    <div class="page-heading page-heading--center">
        <h1>お気に入り</h1>
    </div>

    <p class="message" th:if="${message}" th:text="${message}"></p>

    <!--model.addAttribute("favoriteItems", favoriteBeanList); -->
   <div class="product-grid" th:if="${favoriteItems != null and !#lists.isEmpty(favoriteItems)}">
        <article class="product-card" th:each="favorite : ${favoriteItems}">
            <a class="product-card__image" th:href="@{/client/item/detail/{id}(id=${favorite.itemId})}">
				<!--表示  商品画像-->
               <div class="item_image_area">
					<img th:if="${favorite.image != null}" th:src="@{/images/{image}(image=${favorite.image})}"></img>
					<img th:if="${favorite.image == null}" th:src="@{/images/common/no_image.jpg}"></img>
				</div>
                <span class="product-card__badge">FAVORITE</span>
            </a>
            <!--表示  商品名・カテゴリ・説明文・価格-->
            <div class="product-card__body">
                <h2 th:text="${favorite.itemName}">商品名</h2>
                <p class="product-card__description" th:text="${favorite.description}">説明文</p>
                <div class="product-card__meta">
                    <span th:text="${favorite.categoryName}">CATEGORY</span><br>
                    <strong th:text="${#numbers.formatInteger(favorite.price, 3, 'COMMA')} + '円'">0円</strong>
                </div>
                <!--ボタン  詳細を見る・削除-->
                <div class="product-card__actions">
                    <form th:action="@{/client/item/detail/{id}(id=${favorite.itemId})}" method="post">
                        <input type="hidden" name="id" th:value="${favorite.itemId}">
                        <button class="button button--ghost" type="submit">詳細を見る</button>
                    </form>
                    <form th:action="@{/favorite/delete}" method="post">
                        <input type="hidden" name="id" th:value="${favorite.itemId}">
                        <button class="button button--ghost" type="submit">♥</button>
                    </form>
                </div>
            </div>
        </article>
    </div>
	<!--お気に入りがない場合-->
    <section class="favorite-empty" th:if="${favoriteItems == null or #lists.isEmpty(favoriteItems)}">
       
        <div class="favorite-empty__body">
            <h2>お気に入り商品はまだありません。</h2>
            <a class="button" th:href="@{/item/list}">商品一覧へ</a>
        </div>
    </section>
</main>
</body>
</html>
